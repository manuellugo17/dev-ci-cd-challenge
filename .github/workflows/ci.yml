name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.3.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test
        env:
          APP_ENV: test

      - name: Save failure logs
        if: failure()
        run: npm test 2>&1 | tee logs/pipeline_failure.log || true

      - uses: actions/upload-artifact@v4.6.2
        if: failure()
        with:
          name: failure-logs
          path: logs/

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Build image
        run: docker build -t dev-cicd-challenge:${{ github.sha }} .

      - name: Smoke test image
        run: |
          docker run -d --name temp -p 3001:3001 \
            -e APP_ENV=test -e PORT=3001 \
            dev-cicd-challenge:${{ github.sha }}
          for i in $(seq 1 10); do
            sleep 3
            response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health)
            [ "$response" = "200" ] && break
            echo "Attempt $i failed, retrying..."
          done
          [ "$response" = "200" ] || exit 1
          docker rm -f temp

      - name: Export image
        run: docker save dev-cicd-challenge:${{ github.sha }} -o image.tar

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: docker-image
          path: image.tar

  deploy-staging:
    name: Deploy staging
    needs: build
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Build and tag staging
        run: docker build -t dev-cicd-challenge:staging .

      - name: Deploy
        run: |
          cd ~/challenge/app
          export STAGING_TAG=main-${{ github.sha }}
          docker compose stop staging || true
          docker compose rm -f staging || true
          docker compose up -d staging

      - name: Smoke test
        run: |
          sleep 5
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health)
          [ "$response" = "200" ] || exit 1

  deploy-production:
    name: Deploy production
    needs: deploy-staging
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Backup current image
        run: |
          docker tag dev-cicd-challenge:production \
            dev-cicd-challenge:rollback 2>/dev/null || true

      - name: Build and tag production
        run: docker build -t dev-cicd-challenge:production .

      - name: Deploy
        run: |
          cd ~/challenge/app
          export PROD_TAG=main-${{ github.sha }}
          docker compose stop production || true
          docker compose rm -f production || true
          docker compose up -d production
          echo "main-${{ github.sha }}" > ~/challenge/app/rollback/last-tag.txt

      - name: Health check
        id: healthcheck
        run: |
          sleep 5
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3002/health)
          [ "$response" = "200" ] || exit 1

      - name: Rollback
        if: failure()
        run: |
          docker tag dev-cicd-challenge:rollback \
            dev-cicd-challenge:production 2>/dev/null || true
          cd ~/challenge/app
          docker compose stop production || true
          docker compose rm -f production || true
          docker compose up -d production

  incident-report:
    name: AI Incident Resolver
    needs: [test, build, deploy-staging, deploy-production]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.3.0
        with:
          node-version: 20

      - uses: actions/download-artifact@v4.2.1
        with:
          name: failure-logs
          path: logs/
        continue-on-error: true

      - run: node scripts/ai-resolver.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: incident-report
          path: artifacts/

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('artifacts/incident_report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## AI Incident Report\n\n${report}`
            });

      - name: Read incident report for email
        id: read-report
        run: |
          REPORT=$(cat artifacts/incident_report.md)
          # Escapar saltos de línea para pasarlo como variable de entorno
          echo "REPORT_CONTENT<<EOF" >> $GITHUB_OUTPUT
          cat artifacts/incident_report.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          STEP=$(cat artifacts/incident_report.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('step_failed','unknown'))")
          SEVERITY=$(cat artifacts/incident_report.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('severity','unknown'))")
          echo "STEP_FAILED=$STEP" >> $GITHUB_OUTPUT
          echo "SEVERITY=$SEVERITY" >> $GITHUB_OUTPUT

      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: CI/CD Pipeline <${{ secrets.MAIL_USERNAME }}>
          subject: "❌ Pipeline falló — Step: ${{ steps.read-report.outputs.STEP_FAILED }} | Severity: ${{ steps.read-report.outputs.SEVERITY }} | Repo: ${{ github.repository }}"
          body: |
            El pipeline de CI/CD falló en el repositorio ${{ github.repository }}.

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Autor: ${{ github.actor }}
            Pipeline: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ────────────────────────────────────────
            REPORTE DEL AI INCIDENT RESOLVER
            ────────────────────────────────────────

            ${{ steps.read-report.outputs.REPORT_CONTENT }}

            ────────────────────────────────────────
            Ver el reporte completo y los artefactos en:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
